<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles.css">
<style> html,body{background:var(--ink);} .stage{padding:30px 32px;} .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;} </style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
</head>
<body class="dark">
<div id="root" class="stage"></div>
<script type="text/babel">
  const { Field, Checkbox, Button } = window.HexarosDesignSystem_c7b1f3;
  function Demo() {
    return (
      <div className="form-grid">
        <Field label="Nome e cognome" name="name" defaultValue="Giulia Conti" />
        <Field label="Ruolo" name="role" placeholder="es. Direttore Farmacia" />
        <Field label="Email" type="email" name="email" defaultValue="g.conti@ospedale.it" />
        <Field label="Ente / ospedale" name="org" />
        <Field label="Interesse" type="select" name="interest" full
          options={[{value:'demo',label:'Richiesta demo ivEyes'},{value:'pilot',label:'Valutazione pilota'},{value:'info',label:'Informazioni generali'}]} />
        <Field label="Messaggio" type="textarea" name="message" full placeholder="Raccontaci il tuo contesto (volumi, tipologia preparazioni, sistemi in uso)…" />
        <div style={{gridColumn:'1 / -1'}}>
          <Checkbox id="c" defaultChecked>Ho letto l'informativa privacy e acconsento al trattamento dei dati.</Checkbox>
        </div>
        <div style={{gridColumn:'1 / -1'}}><Button variant="primary" arrow>Invia richiesta</Button></div>
      </div>
    );
  }
  ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
