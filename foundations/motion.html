<!-- @dsCard group="Spacing" viewport="700x170" name="Motion & Easing" subtitle="Quiet entrances — rise & fade on a soft cubic-bezier" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { background: var(--ink); }
  .pad { padding: 26px 32px; display:flex; flex-direction:column; gap: 16px; font-family: var(--font-mono); }
  .track { position:relative; height: 30px; background: var(--ink-2); border-radius: 4px; overflow:hidden; }
  .dot { position:absolute; top:5px; left:5px; width:20px; height:20px; border-radius:999px; background: var(--accent); animation: slide 2600ms var(--ease) infinite; }
  .dot.fade { background: var(--teal-bright); animation: fadein 2600ms var(--ease-out) infinite; left: auto; right: 5px; }
  @keyframes slide { 0%,15%{transform:translateX(0)} 55%,75%{transform:translateX(560px)} 100%{transform:translateX(0)} }
  @keyframes fadein { 0%,15%{opacity:0} 55%,85%{opacity:1} 100%{opacity:0} }
  .row { display:flex; justify-content:space-between; font-size: 10.5px; color: var(--ivory-dim); }
  .row b { color: var(--accent); font-weight:400; }
</style>
</head>
<body class="dark">
  <div class="pad">
    <div class="track"><div class="dot"></div></div>
    <div class="row"><span><b>--ease</b> cubic-bezier(.22,1,.36,1)</span><span><b>--dur-slow</b> 400ms</span></div>
    <div class="row"><span><b>--ease-out</b> cubic-bezier(.16,1,.3,1)</span><span><b>--dur-rise</b> 1000ms · @keyframes rise / fade</span></div>
  </div>
</body>
</html>
