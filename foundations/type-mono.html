<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { background: var(--ink); }
  .pad { padding: 28px 32px; display:flex; flex-direction:column; gap:18px; }
  .eb { font-family: var(--font-mono); font-size: 11px; font-weight:500; letter-spacing: 0.24em; text-transform: uppercase; color: var(--accent); }
  .key { font-family: var(--font-mono); font-size: 10.5px; letter-spacing:0.2em; text-transform:uppercase; color: var(--ivory-dim); }
  .code { font-family: var(--font-mono); font-size: 13px; color: var(--teal-bright); }
  .meta { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--ivory-dim); }
</style>
</head>
<body class="dark">
  <div class="pad">
    <div class="eb">HEXAROS — TECNOLOGIE PER LA FARMACIA</div>
    <div class="key">HARDWARE · INTERFACCIA · COMPLIANCE</div>
    <div class="code">Target: 12.4 g · Tolleranza ±2% · VALIDATING…</div>
    <div class="meta">IBM Plex Mono · 400 / 500 · --fs-eyebrow 11px</div>
  </div>
</body>
</html>
