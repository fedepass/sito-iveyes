<!-- @dsCard group="Type" viewport="700x180" name="Fraunces — Display" subtitle="Optical serif for headlines · SOFT 30 / opsz 144" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { background: var(--ink); }
  .pad { padding: 28px 32px; font-family: var(--font-body); }
  .spec { font-family: var(--font-display); font-weight: 400; font-size: 56px; line-height: 0.98; letter-spacing: -0.035em; color: var(--ivory); font-variation-settings: 'SOFT' 30, 'opsz' 144; }
  .spec em { font-style: italic; color: var(--accent); font-variation-settings: 'SOFT' 100, 'opsz' 144; }
  .meta { margin-top: 16px; font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.1em; color: var(--ivory-dim); }
</style>
</head>
<body class="dark">
  <div class="pad">
    <div class="spec">Reso <em>governabile.</em></div>
    <div class="meta">Fraunces · 400 / italic · --fs-h2 · --fraunces-display</div>
  </div>
</body>
</html>
