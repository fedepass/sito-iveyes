<!-- @dsCard group="Colors" viewport="700x150" name="Ink Surfaces" subtitle="Layered dark backgrounds — the company identity" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { background: var(--ink); }
  .row { display: grid; grid-template-columns: repeat(3,1fr); gap: 1px; background: var(--rule-dark); padding: 18px; font-family: var(--font-body); }
  .sw { padding: 22px 18px 18px; display: flex; flex-direction: column; gap: 6px; min-height: 110px; justify-content: flex-end; }
  .name { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ivory); }
  .hex { font-family: var(--font-mono); font-size: 12px; color: var(--ivory-dim); }
  .tok { font-family: var(--font-mono); font-size: 10.5px; color: var(--accent); }
</style>
</head>
<body class="dark">
  <div class="row">
    <div class="sw" style="background:var(--ink)"><span class="tok">--ink</span><span class="name">Ink</span><span class="hex">#0A0F1A</span></div>
    <div class="sw" style="background:var(--ink-2)"><span class="tok">--ink-2</span><span class="name">Ink 2 · surface</span><span class="hex">#10182A</span></div>
    <div class="sw" style="background:var(--ink-3)"><span class="tok">--ink-3</span><span class="name">Ink 3 · well</span><span class="hex">#1A2440</span></div>
  </div>
</body>
</html>
