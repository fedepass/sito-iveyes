<!-- @dsCard group="Type" viewport="700x230" name="Display Type Scale" subtitle="Fluid clamp scale — hero to card title" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  html,body { background: var(--ink); }
  .pad { padding: 22px 32px; font-family: var(--font-display); }
  .line { display:flex; align-items:baseline; gap:16px; color: var(--ivory); font-weight:400; line-height:1.05; font-variation-settings:'SOFT' 30,'opsz' 96; border-bottom:1px solid var(--rule-dark); padding:10px 0; }
  .tok { font-family: var(--font-mono); font-size: 10px; letter-spacing:0.1em; color: var(--accent); flex-shrink:0; width:130px; }
</style>
</head>
<body class="dark">
  <div class="pad">
    <div class="line"><span class="tok">--fs-hero</span><span style="font-size:46px">Aa</span></div>
    <div class="line"><span class="tok">--fs-h2</span><span style="font-size:36px">Reso governabile</span></div>
    <div class="line"><span class="tok">--fs-h3</span><span style="font-size:28px">Tracciabilità che tiene</span></div>
    <div class="line"><span class="tok">--fs-stat</span><span style="font-weight:300;color:var(--accent)">100%</span></div>
  </div>
</body>
</html>
