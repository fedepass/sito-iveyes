<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hexaros — Tecnologie per la farmacia ospedaliera</title>
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<meta http-equiv="refresh" content="0; url=ui_kits/hexaros-site/index.html">
<link rel="stylesheet" href="styles.css">
<style>
  html, body { height: 100%; margin: 0; background: var(--ink); }
  .splash { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; color: var(--ivory); font-family: var(--font-body); text-align: center; padding: 24px; }
  .mark { display: flex; align-items: center; gap: 12px; }
  .mark svg { width: 36px; height: 40px; }
  .mark span { font-family: var(--font-display); font-size: 30px; font-weight: 600; letter-spacing: 0.02em; font-variation-settings: 'SOFT' 30, 'opsz' 60; }
  .msg { font-size: 14px; color: var(--ivory-dim); letter-spacing: 0.02em; }
  .msg a { color: var(--accent); }
  .spin { width: 22px; height: 22px; border: 2px solid var(--rule-dark-2); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="dark">
  <div class="splash">
    <div class="mark">
      <svg viewBox="0 0 48 54" aria-hidden="true"><polygon points="24,2 44,14 44,38 24,50 4,38 4,14" fill="none" stroke="currentColor" stroke-width="2"/><circle cx="24" cy="26" r="4.5" fill="#34A0C0"/></svg>
      <span>Hexaros</span>
    </div>
    <div class="spin" aria-hidden="true"></div>
    <p class="msg">Caricamento del sito… se non si apre automaticamente, <a href="ui_kits/hexaros-site/index.html">clicca qui</a>.</p>
  </div>
</body>
</html>
